<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <span class="pokeball-icon"></span>
            <h1 class="titulo">Pokédex</h1>
        </div>
    </header>

    <main class="app-layout">
        <aside class="sidebar">
            <p class="sidebar-label">Pokémons</p>
            <div id="apiTeste" class="lista-botoes"></div>
        </aside>

        <section class="main-content">
            <div class="pokemon-card" id="pokemonCard">
                <div class="empty-state">
                    <div class="pokeball-empty"></div>
                    <p>Selecione um Pokémon</p>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
